spring.application.name=demo
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:demo}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
server.port=8081

app.jwt.secret=${JWT_SECRET:wotege-secret-key-at-least-32-bytes-long-for-hs256-algorithm}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173


